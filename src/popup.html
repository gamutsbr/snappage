<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=320">
  <title>SnapPage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- ── Header ─────────────────────────────────────────────── -->
  <header class="header">
    <div class="logo">
      <svg class="logo-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1.5" y="5.5" width="21" height="15" rx="2.5" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="12" cy="13" r="4" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="12" cy="13" r="1.75" fill="currentColor"/>
        <path d="M8.5 5.5V4.5A1.5 1.5 0 0 1 10 3h4a1.5 1.5 0 0 1 1.5 1.5v1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <circle cx="19.5" cy="9" r="1" fill="currentColor"/>
      </svg>
      <span class="logo-text">SNAPPAGE</span>
    </div>
    <div class="header-right">
      <span class="version" data-app-version>v...</span>
      <div class="status-dot" id="statusDot"></div>
    </div>
  </header>

  <div class="divider"></div>

  <!-- ── Body ───────────────────────────────────────────────── -->
  <main class="body">

    <!-- Mode -->
    <section class="section">
      <label class="section-label">MODO DE CAPTURA</label>
      <div class="toggle-group" id="modeGroup">
        <button class="toggle-btn active" data-value="full">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="3" y="3" width="8" height="8" rx="0.5" fill="currentColor" opacity="0.3"/></svg>
          Página Completa
        </button>
        <button class="toggle-btn" data-value="visible">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="12" height="12" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="3" y="3" width="5" height="5" rx="0.5" fill="currentColor"/></svg>
          Visível Apenas
        </button>
      </div>
    </section>

    <!-- Format -->
    <section class="section">
      <label class="section-label">FORMATO</label>
      <div class="format-row">
        <div class="pill-group" id="formatGroup">
          <button class="pill-btn active" data-value="png">PNG</button>
          <button class="pill-btn"        data-value="jpeg">JPEG</button>
          <button class="pill-btn"        data-value="webp">WebP</button>
        </div>
      </div>
      <div class="quality-container" id="qualityContainer">
        <label class="section-label quality-label" for="qualitySlider">QUALIDADE JPEG</label>
        <div class="quality-controls">
          <input type="range" class="quality-slider" id="qualitySlider" min="10" max="100" value="85">
          <span class="quality-value" id="qualityValue">85%</span>
        </div>
      </div>
    </section>

    <!-- Resolution -->
    <section class="section">
      <label class="section-label">RESOLUÇÃO</label>
      <div class="pill-group" id="resolutionGroup">
        <button class="pill-btn active" data-value="1">1×</button>
        <button class="pill-btn"        data-value="2">2×</button>
      </div>
    </section>

    <!-- Delay -->
    <section class="section">
      <label class="section-label">AGUARDAR ANTES</label>
      <div class="pill-group" id="delayGroup">
        <button class="pill-btn active" data-value="0">Agora</button>
        <button class="pill-btn"        data-value="1">1s</button>
        <button class="pill-btn"        data-value="3">3s</button>
        <button class="pill-btn"        data-value="5">5s</button>
      </div>
    </section>

    <!-- Output -->
    <section class="section">
      <label class="section-label">SALVAR COMO</label>
      <div class="checkbox-group">
        <label class="checkbox-label">
          <input type="checkbox" id="outputDownload" checked>
          <span class="checkbox-custom"></span>
          <span>Download</span>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="outputClipboard">
          <span class="checkbox-custom"></span>
          <span>Copiar</span>
        </label>
      </div>
      <div class="output-note" id="outputNote" hidden>Copiar está disponível apenas para PNG. Use Download para JPEG ou WebP.</div>
    </section>

  </main>

  <!-- ── Capture Button ──────────────────────────────────────── -->
  <div class="capture-wrap">
    <button class="capture-btn" id="captureBtn">
      <svg class="shutter-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/>
        <circle cx="12" cy="12" r="4" fill="currentColor"/>
      </svg>
      <span id="captureText">CAPTURAR</span>
    </button>
  </div>

  <!-- ── Preview ─────────────────────────────────────────────── -->
  <div class="preview-area" id="previewArea">
    <div class="preview-header">
      <span>PRÉVIA</span>
      <button class="preview-close" id="previewClose">✕</button>
    </div>
    <img class="preview-img" id="previewImg" src="" alt="Preview">
    <div class="preview-meta" id="previewMeta"></div>
  </div>

  <!-- ── Toast ───────────────────────────────────────────────── -->
  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
